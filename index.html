<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="雜記本">
<link rel="manifest" href="manifest.json">
<title>雜記本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:rgba(255,255,255,0.08);
  --text:#f0f0f5;--dim:#888;--accent:#7c6af7;--accent2:#5b52d4;
  --green:#4ade80;--red:#f87171;--orange:#fb923c;--blue:#60a5fa;--pink:#f472b6;
}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:48px 16px 14px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-title{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}
.app-title span{color:var(--accent)}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:active{transform:scale(0.9)}
.icon-btn.active{background:rgba(124,106,247,0.15);border-color:var(--accent);color:var(--accent)}

/* 搜尋 */
.search-wrap{position:relative;margin-bottom:10px}
.search-input{width:100%;padding:10px 14px 10px 38px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.88rem;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.9rem;pointer-events:none}

/* 分類篩選 */
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:0.75rem;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.filter-chip.active{background:rgba(124,106,247,0.2);border-color:var(--accent);color:var(--accent);font-weight:600}

/* 主內容 */
.main{padding:14px}

/* 筆記卡片 */
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;position:relative;transition:transform 0.15s}
.note-card:active{transform:scale(0.99)}

/* 圖片卡片 */
.note-img{width:100%;max-height:220px;object-fit:cover;display:block}
.note-img-thumb{width:100%;height:180px;object-fit:cover;display:block}

/* URL 卡片 */
.url-preview{display:flex;gap:10px;padding:12px}
.url-thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.url-info{flex:1;min-width:0}
.url-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.url-desc{font-size:0.72rem;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.url-domain{font-size:0.68rem;color:var(--accent);display:flex;align-items:center;gap:4px}

/* 文字卡片 */
.note-body{padding:12px}
.note-content{font-size:0.85rem;color:var(--text);line-height:1.6;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;margin-bottom:6px}
.note-summary{font-size:0.72rem;color:var(--accent);font-style:italic;margin-bottom:6px}

/* 卡片底部 */
.note-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--border)}
.note-meta{display:flex;align-items:center;gap:8px}
.note-cat{font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.note-date{font-size:0.65rem;color:var(--dim)}
.note-tags{display:flex;gap:4px;flex-wrap:wrap}
.note-tag{font-size:0.60rem;padding:1px 6px;background:rgba(124,106,247,0.15);border-radius:6px;color:var(--accent)}
.note-del{width:28px;height:28px;border-radius:8px;border:none;background:rgba(248,113,113,0.1);color:var(--red);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 分類顏色 */
.cat-shopping{background:rgba(251,146,60,0.15);color:var(--orange)}
.cat-food{background:rgba(74,222,128,0.15);color:var(--green)}
.cat-social{background:rgba(244,114,182,0.15);color:var(--pink)}
.cat-media{background:rgba(248,113,113,0.15);color:var(--red)}
.cat-info{background:rgba(96,165,250,0.15);color:var(--blue)}
.cat-image{background:rgba(124,106,247,0.15);color:var(--accent)}
.cat-note{background:rgba(255,255,255,0.08);color:var(--dim)}
.cat-url{background:rgba(96,165,250,0.15);color:var(--blue)}
.cat-other{background:rgba(255,255,255,0.06);color:var(--dim)}

/* 新增按鈕 */
.fab{position:fixed;bottom:20px;right:16px;width:56px;height:56px;border-radius:18px;background:var(--accent);border:none;color:white;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 20px rgba(124,106,247,0.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:flex-end}
.modal-bg.show{display:flex}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:16px 16px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:16px}

/* 輸入 */
.input-tabs{display:flex;gap:6px;margin-bottom:14px}
.input-tab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:0.80rem;cursor:pointer;text-align:center;transition:all 0.15s}
.input-tab.active{background:rgba(124,106,247,0.15);border-color:var(--accent);color:var(--accent);font-weight:600}

.inp{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.88rem;outline:none;margin-bottom:10px;font-family:-apple-system,sans-serif}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:none;line-height:1.6;min-height:100px}

.tag-input-wrap{display:flex;gap:8px;margin-bottom:10px}
.tags-preview{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;min-height:0}
.tag-item{font-size:0.72rem;padding:2px 8px;background:rgba(124,106,247,0.15);border-radius:8px;color:var(--accent);cursor:pointer}

/* AI 開關 */
.ai-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:12px}
.ai-toggle-label{font-size:0.80rem;color:var(--dim)}
.ai-toggle-label span{font-size:0.68rem;color:var(--accent);display:block;margin-top:2px}
.toggle{position:relative;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:0.2s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--dim);border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:rgba(124,106,247,0.3);border-color:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px);background:var(--accent)}

/* 圖片預覽 */
.img-preview{width:100%;border-radius:10px;max-height:200px;object-fit:contain;margin-bottom:10px;display:none}

/* 送出按鈕 */
.submit-btn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.submit-btn:active{opacity:0.8}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}

/* 空狀態 */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* loading */
.loading{text-align:center;padding:40px;color:var(--dim)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,30,40,0.95);color:var(--text);padding:10px 20px;border-radius:20px;font-size:0.82rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;border:1px solid var(--border)}
.toast.show{opacity:1}

/* 設定 */
.settings-panel{display:none;padding:14px;background:var(--surface);border-top:1px solid var(--border)}
.settings-panel.show{display:block}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.settings-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">📒 雜<span>記</span>本</div>
    <div class="header-actions">
      <button class="icon-btn" id="settings-btn" onclick="toggleSettings()">⚙️</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" placeholder="搜尋筆記..." oninput="onSearch()">
  </div>
  <!-- 系統分類 -->
  <div class="filter-scroll" id="filter-scroll">
    <button class="filter-chip active" data-cat="" onclick="setFilter('',this)">全部</button>
    <button class="filter-chip" data-cat="note" onclick="setFilter('note',this)">💬 文字</button>
    <button class="filter-chip" data-cat="url" onclick="setFilter('url',this)">🔗 網址</button>
    <button class="filter-chip" data-cat="image" onclick="setFilter('image',this)">🖼️ 圖片</button>
    <button class="filter-chip" data-cat="shopping" onclick="setFilter('shopping',this)">🛍️ 購物</button>
    <button class="filter-chip" data-cat="food" onclick="setFilter('food',this)">🍜 美食</button>
    <button class="filter-chip" data-cat="social" onclick="setFilter('social',this)">📱 社群</button>
    <button class="filter-chip" data-cat="media" onclick="setFilter('media',this)">🎬 影音</button>
    <button class="filter-chip" data-cat="info" onclick="setFilter('info',this)">📰 資訊</button>
  </div>
  <!-- 手動標籤篩選 -->
  <div class="filter-scroll" id="tag-filter-scroll" style="margin-top:6px">
    <button class="filter-chip active" data-tag="" onclick="setTagFilter('',this)">🏷️ 全部標籤</button>
    <button class="filter-chip" data-tag="梗圖" onclick="setTagFilter('梗圖',this)">😂 梗圖</button>
    <button class="filter-chip" data-tag="政治" onclick="setTagFilter('政治',this)">🔥 政治</button>
    <button class="filter-chip" data-tag="爭議" onclick="setTagFilter('爭議',this)">⚡ 爭議</button>
    <button class="filter-chip" data-tag="旅遊" onclick="setTagFilter('旅遊',this)">🗺️ 旅遊</button>
    <button class="filter-chip" data-tag="秘境" onclick="setTagFilter('秘境',this)">🏔️ 秘境</button>
    <button class="filter-chip" data-tag="跑步" onclick="setTagFilter('跑步',this)">🏃 跑步</button>
    <button class="filter-chip" data-tag="登山" onclick="setTagFilter('登山',this)">⛰️ 登山</button>
    <button class="filter-chip" data-tag="待買" onclick="setTagFilter('待買',this)">🛒 待買</button>
    <button class="filter-chip" data-tag="待看" onclick="setTagFilter('待看',this)">👀 待看</button>
    <button class="filter-chip" data-tag="教學" onclick="setTagFilter('教學',this)">📚 教學</button>
  </div>
</div>

<!-- 設定面板 -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <span>API 伺服器網址</span>
  </div>
  <input class="inp" id="api-url-input" placeholder="https://your-notes-api.onrender.com" style="margin-top:8px">
  <div class="settings-row">
    <span>用戶 ID</span>
  </div>
  <input class="inp" id="user-id-input" placeholder="預設：default">
  <div class="settings-row">
    <span style="color:var(--dim);font-size:0.75rem">AI 功能（需要 Gemini API Key）</span>
  </div>
  <input class="inp" id="gemini-key-input" placeholder="AIzaSy... (選填，開啟 AI 分類+摘要)" type="password">
  <button class="submit-btn" onclick="saveSettings()" style="margin-top:8px">儲存設定</button>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div>載入中...</div>
</div>

<button class="fab" onclick="showAddModal()">＋</button>

<!-- 新增 Modal -->
<div class="modal-bg" id="add-modal" onclick="if(event.target===this)hideAddModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新增筆記</div>

    <div class="input-tabs">
      <button class="input-tab active" onclick="switchInputTab('note',this)">💬 文字</button>
      <button class="input-tab" onclick="switchInputTab('url',this)">🔗 網址</button>
      <button class="input-tab" onclick="switchInputTab('image',this)">🖼️ 圖片</button>
    </div>

    <!-- 文字輸入 -->
    <div id="tab-note">
      <textarea class="inp" id="note-content" placeholder="輸入任何內容..." onpaste="handlePaste(event,'note-content')"></textarea>
    </div>

    <!-- 網址輸入 -->
    <div id="tab-url" style="display:none">
      <input class="inp" id="url-input" type="text" placeholder="貼上網址或含網址的文字..." onpaste="handlePaste(event,'url-input')">
    </div>

    <!-- 圖片上傳 -->
    <div id="tab-image" style="display:none">
      <img id="img-preview" class="img-preview">
      <!-- 拖曳/貼上區域 -->
      <div id="drop-zone"
        ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
        ondragleave="this.style.borderColor='var(--border)'"
        ondrop="onImageDrop(event)"
        style="border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s"
        onclick="document.getElementById('img-input').click()">
        <div style="font-size:2rem;margin-bottom:8px">🖼️</div>
        <div style="font-size:0.82rem;color:var(--dim)">點擊選擇、拖曳或 Ctrl+V 貼上圖片</div>
      </div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="onImageSelect(this)">
    </div>

    <!-- 手動標籤 -->
    <div style="margin-bottom:10px">
      <div style="font-size:0.72rem;color:var(--dim);margin-bottom:8px;letter-spacing:0.05em">🏷️ 選擇標籤（可多選）</div>
      <div id="tag-groups-ui"></div>
      <div class="tags-preview" id="tags-preview" style="margin-top:8px"></div>
    </div>
    <!-- 自訂標籤 -->
    <div class="tag-input-wrap">
      <input class="inp" id="tag-input" placeholder="自訂標籤..." style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault()}">
      <button onclick="addTag()" style="padding:10px 14px;background:rgba(124,106,247,0.15);border:1px solid var(--accent);border-radius:10px;color:var(--accent);cursor:pointer;font-size:0.85rem">加入</button>
    </div>

    <!-- AI 開關 -->
    <div class="ai-toggle-row">
      <div class="ai-toggle-label">
        🤖 AI 分類與摘要
        <span>需要設定 Gemini API Key</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="ai-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitNote()">儲存筆記</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 編輯筆記 Modal -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:flex-end" onclick="if(event.target===this)closeEditModal()">
  <div style="background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:16px 16px calc(20px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:16px">✏️ 編輯筆記</div>

    <!-- 系統分類 -->
    <div style="font-size:0.72rem;color:var(--dim);margin-bottom:6px">系統分類</div>
    <select id="edit-category" class="inp" style="margin-bottom:14px">
      <option value="note">💬 文字</option>
      <option value="url">🔗 網址</option>
      <option value="image">🖼️ 圖片</option>
      <option value="shopping">🛍️ 購物</option>
      <option value="food">🍜 美食</option>
      <option value="social">📱 社群</option>
      <option value="media">🎬 影音</option>
      <option value="info">📰 資訊</option>
      <option value="other">📦 其他</option>
    </select>

    <!-- 標籤群組 -->
    <div style="font-size:0.72rem;color:var(--dim);margin-bottom:8px">手動標籤</div>
    <div id="edit-tag-groups"></div>
    <div id="edit-tags-preview" style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0"></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input class="inp" id="edit-tag-input" placeholder="自訂標籤..." style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter'){addEditTag();event.preventDefault()}">
      <button onclick="addEditTag()" style="padding:10px 14px;background:rgba(124,106,247,0.15);border:1px solid var(--accent);border-radius:10px;color:var(--accent);cursor:pointer;font-size:0.85rem">加入</button>
    </div>

    <!-- 備註 -->
    <div style="font-size:0.72rem;color:var(--dim);margin-bottom:6px">備註</div>
    <textarea class="inp" id="edit-note" rows="3" placeholder="加入備註..."></textarea>

    <button onclick="saveEdit()" style="width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:4px">儲存修改</button>
  </div>
</div>

<!-- 圖片放大 Modal -->
<div id="img-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center;padding:20px" onclick="closeImageModal()">
  <img id="img-modal-img" src="" style="max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain">
  <button onclick="closeImageModal()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer">✕</button>
  <a id="img-modal-dl" href="" download style="position:absolute;bottom:20px;right:20px;background:rgba(255,255,255,0.15);border:none;color:white;padding:8px 16px;border-radius:20px;font-size:0.82rem;text-decoration:none">⬇️ 下載</a>
</div>

<script>
const API_BASE = localStorage.getItem('notes_api') || '';
const USER_ID  = localStorage.getItem('notes_user') || 'default';

let currentFilter = '';
let currentSearch = '';
let currentTagFilter = '';
let allNotes = [];
let pendingTags = [];
let pendingImageB64 = '';
let currentTab = 'note';
let searchTimer = null;

// 預設標籤群組
const TAG_GROUPS = [
  { icon: '😂', name: '趣味', tags: ['梗圖', '搞笑', '迷因'] },
  { icon: '🔥', name: '話題', tags: ['政治', '爭議', '時事', '經典言論'] },
  { icon: '🏃', name: '運動', tags: ['跑步', '登山', '健身', '比賽'] },
  { icon: '🗺️', name: '探索', tags: ['旅遊', '秘境', '美食探店', '住宿'] },
  { icon: '🛒', name: '待辦', tags: ['待買', '待看', '想去', '待辦'] },
  { icon: '📚', name: '知識', tags: ['教學', '攻略', '評測', '食譜'] },
];

// ── 初始化 ──
window.addEventListener('load', () => {
  // 註冊 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/my-notes/sw.js').catch(e => console.log('SW:', e));
  }

  document.getElementById('api-url-input').value = localStorage.getItem('notes_api') || '';
  document.getElementById('user-id-input').value = localStorage.getItem('notes_user') || 'default';
  document.getElementById('gemini-key-input').value = localStorage.getItem('notes_gemini') || '';

  // 處理 Web Share Target 傳入的參數
  const params = new URLSearchParams(window.location.search);
  const sharedTitle = params.get('title') || '';
  const sharedText  = params.get('text') || '';
  const sharedUrl   = params.get('url') || '';

  if (sharedTitle || sharedText || sharedUrl) {
    // 清除 URL 參數避免重複觸發
    window.history.replaceState({}, '', window.location.pathname);

    if (!localStorage.getItem('notes_api')) {
      toggleSettings();
      showToast('請先設定 API 伺服器網址');
      return;
    }

    loadNotes().then(() => {
      // 自動開啟新增 modal 並填入分享內容
      showAddModal();
      setTimeout(() => {
        const combined = [sharedTitle, sharedText, sharedUrl].filter(Boolean).join(' ').trim();
        const urlMatch = combined.match(/(https?:\/\/\S+)/);

        if (urlMatch) {
          // 有網址：切到網址 tab
          const urlTab = document.querySelector('.input-tab:nth-child(2)');
          if (urlTab) switchInputTab('url', urlTab);
          document.getElementById('url-input').value = combined;
        } else {
          // 純文字
          document.getElementById('note-content').value = combined;
        }
        showToast('📥 已接收分享內容，確認後儲存');
      }, 500);
    });
    return;
  }

  if (!localStorage.getItem('notes_api')) {
    toggleSettings();
    showToast('請先設定 API 伺服器網址');
  } else {
    loadNotes();
  }
});

// ── 設定 ──
function toggleSettings() {
  const p = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-btn');
  p.classList.toggle('show');
  btn.classList.toggle('active');
}

function saveSettings() {
  const api = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  const uid = document.getElementById('user-id-input').value.trim() || 'default';
  const gk  = document.getElementById('gemini-key-input').value.trim();
  localStorage.setItem('notes_api', api);
  localStorage.setItem('notes_user', uid);
  if (gk) localStorage.setItem('notes_gemini', gk);
  showToast('✅ 設定已儲存');
  toggleSettings();
  loadNotes();
}

// ── 分類標籤 ──
const CAT_LABELS = {
  shopping: '🛍️ 購物', food: '🍜 美食', social: '📱 社群',
  media: '🎬 影音', info: '📰 資訊', image: '🖼️ 圖片',
  note: '💬 文字', url: '🔗 網址', other: '📦 其他'
};

// ── 篩選 ──
function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderNotes();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = document.getElementById('search-input').value.trim().toLowerCase();
    renderNotes();
  }, 300);
}

// ── 載入筆記 ──
async function loadNotes() {
  const api = localStorage.getItem('notes_api');
  const uid = localStorage.getItem('notes_user') || 'default';
  if (!api) return;

  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const r = await fetch(`${api}/api/notes?user_id=${uid}&limit=100`);
    const d = await r.json();
    if (d.success) {
      allNotes = d.notes || [];
      renderNotes();
    } else {
      document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>載入失敗</div>`;
    }
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="empty"><div class="empty-icon">🔌</div>連線失敗<br><small style="font-size:0.75rem;color:var(--dim)">${e.message}</small></div>`;
  }
}

// ── 渲染筆記 ──
function renderNotes() {
  let notes = allNotes;
  if (currentFilter) notes = notes.filter(n => n.category === currentFilter);
  if (currentTagFilter) notes = notes.filter(n => (n.tags||[]).includes(currentTagFilter));
  if (currentSearch) {
    notes = notes.filter(n => {
      const preview = n.preview || {};
      return (
        (n.content||'').toLowerCase().includes(currentSearch) ||
        (n.url||'').toLowerCase().includes(currentSearch) ||
        (n.summary||'').toLowerCase().includes(currentSearch) ||
        (preview.title||'').toLowerCase().includes(currentSearch) ||
        (preview.description||'').toLowerCase().includes(currentSearch) ||
        ((n.tags||[]).some(t => t.toLowerCase().includes(currentSearch)))
      );
    });
  }

  const main = document.getElementById('main');
  if (!notes.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">${currentSearch ? '🔍' : '📝'}</div>${currentSearch ? '找不到符合的筆記' : '還沒有任何筆記<br><small style="font-size:0.75rem">點右下角 ＋ 開始記錄</small>'}</div>`;
    return;
  }

  main.innerHTML = notes.map(n => makeCard(n)).join('');
}

function makeCard(n) {
  const catClass = `cat-${n.category || 'other'}`;
  const catLabel = CAT_LABELS[n.category] || '📦 其他';
  const date = n.created_at ? new Date(n.created_at).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
  const tags = (n.tags||[]).map(t => `<span class="note-tag">#${t}</span>`).join('');
  const footer = `
    <div class="note-footer">
      <div class="note-meta">
        <span class="note-cat ${catClass}">${catLabel}</span>
        <span class="note-date">${date}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${tags}
        <button onclick="event.stopPropagation();openEditModal('${n.id}')" style="width:28px;height:28px;border-radius:8px;border:none;background:rgba(124,106,247,0.1);color:var(--accent);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center">✏️</button>
      <button class="note-del" onclick="event.stopPropagation();deleteNote('${n.id}')">🗑️</button>
      </div>
    </div>`;

  // 圖片卡片
  if (n.type === 'image' && n.image_url) {
    return `<div class="note-card">
      <div style="position:relative;cursor:pointer" onclick="openImageModal('${n.image_url}')">
        <img class="note-img-thumb" src="${n.image_url}" loading="lazy"
          onerror="this.parentElement.innerHTML='<div style=\'height:120px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:0.8rem\'>圖片載入失敗</div>'">
        <div style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);border-radius:6px;padding:3px 8px;font-size:0.65rem;color:white">🔍 點擊放大</div>
      </div>
      ${footer}
    </div>`;
  }

  // 網址卡片
  if (n.type === 'url') {
    const p = n.preview || {};
    const isYoutube = p.type === 'youtube' || (n.url||'').includes('youtube.com') || (n.url||'').includes('youtu.be');
    const ytId = p.video_id || ((n.url||'').match(/(?:v=|youtu\.be\/)([\w-]+)/)||[])[1];

    let thumbHtml = '';
    if (isYoutube && ytId) {
      thumbHtml = `<div style="position:relative;width:100%;flex-shrink:0;margin-bottom:0">
        <img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" style="width:100%;height:160px;object-fit:cover;display:block;border-radius:10px 10px 0 0">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:10px 10px 0 0">
          <div style="width:52px;height:52px;background:rgba(255,0,0,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem">▶</div>
        </div>
      </div>`;
      return `<div class="note-card" onclick="if(event.target.closest('.note-del'))return;openExternal('${n.url}')" style="cursor:pointer">
        ${thumbHtml}
        <div style="padding:10px 12px">
          <div style="font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${p.title || 'YouTube 影片'}</div>
          ${p.description ? `<div style="font-size:0.72rem;color:var(--dim)">${p.description}</div>` : ''}
        </div>
        ${footer}
      </div>`;
    }

    const thumb = p.image
      ? `<img src="${p.image}" style="width:70px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`
      : `<div class="url-thumb">🔗</div>`;
    const openUrl = p.real_url || n.url;
    return `<div class="note-card" onclick="if(event.target.closest('.note-del'))return;openExternal('${openUrl}')" style="cursor:pointer">
      <div class="url-preview">
        ${thumb}
        <div class="url-info">
          <div class="url-title">${p.title || n.url}</div>
          ${p.description ? `<div class="url-desc">${p.description}</div>` : ''}
          <div class="url-domain">🌐 ${p.domain || ''}</div>
        </div>
      </div>
      ${footer}
    </div>`;
  }

  // 混合卡片（文字 + 網址，例如 momo 分享）
  if (n.type === 'mixed' && n.url) {
    const summary = n.summary ? `<div class="note-summary">💡 ${n.summary}</div>` : '';
    return `<div class="note-card">
      <div class="note-body">
        ${summary}
        <div class="note-content" style="margin-bottom:8px">${(n.content||'').replace(/\n/g,'<br>')}</div>
        <a href="${n.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"
          style="display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--accent);text-decoration:none;padding:5px 10px;background:rgba(124,106,247,0.1);border-radius:8px;border:1px solid rgba(124,106,247,0.2)">
          🔗 ${(n.url.match(/^https?:\/\/([^/]+)/)||[])[1]||n.url}
        </a>
      </div>
      ${footer}
    </div>`;
  }

  // 文字卡片
  const summary = n.summary ? `<div class="note-summary">💡 ${n.summary}</div>` : '';
  return `<div class="note-card">
    <div class="note-body">
      ${summary}
      <div class="note-content">${(n.content||'').replace(/\n/g,'<br>')}</div>
    </div>
    ${footer}
  </div>`;
}

// ── 新增 Modal ──
function showAddModal() {
  pendingTags = [];
  pendingImageB64 = '';
  document.getElementById('note-content').value = '';
  document.getElementById('url-input').value = '';
  document.getElementById('tag-input').value = '';
  document.getElementById('tags-preview').innerHTML = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('add-modal').classList.add('show');
  renderTagGroups();
}

function hideAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

function switchInputTab(tab, btn) {
  currentTab = tab;
  ['note','url','image'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.input-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function addTag() {
  const input = document.getElementById('tag-input');
  const val = input.value.trim().replace(/^#/,'');
  if (!val || pendingTags.includes(val)) return;
  pendingTags.push(val);
  input.value = '';
  renderPendingTags();
}

function renderPendingTags() {
  document.getElementById('tags-preview').innerHTML =
    pendingTags.map(t => `<span class="tag-item" onclick="removeTag('${t}')">#${t} ✕</span>`).join('');
}

function removeTag(t) {
  pendingTags = pendingTags.filter(x => x !== t);
  renderPendingTags();
}

function onImageSelect(input) {
  const file = input.files[0];
  if (!file) return;
  processImageFile(file);
}

// ── 送出筆記 ──
async function submitNote() {
  const api = localStorage.getItem('notes_api');
  const uid = localStorage.getItem('notes_user') || 'default';
  const useAI = document.getElementById('ai-toggle').checked;
  const geminiKey = localStorage.getItem('notes_gemini') || '';
  const btn = document.getElementById('submit-btn');

  if (!api) { showToast('請先到設定填入 API 網址'); toggleSettings(); return; }

  let body = {user_id: uid, tags: pendingTags, use_ai: useAI && !!geminiKey};

  if (currentTab === 'note') {
    const text = document.getElementById('note-content').value.trim();
    if (!text) { showToast('請輸入內容'); return; }

    // 偵測文字中是否有夾雜網址（例如 momo、蝦皮分享）
    const urlMatch = text.match(/(https?:\/\/\S+)/);
    if (urlMatch) {
      const extractedUrl = urlMatch[1].replace(/[)】」'">]+$/, '');
      const extractedText = text.replace(urlMatch[1], '').trim().replace(/\s+/g, ' ').trim();
      body.type = 'mixed';
      body.content = extractedText || extractedUrl;
      body.url = extractedUrl;
    } else {
      body.type = 'note';
      body.content = text;
    }
  } else if (currentTab === 'url') {
    const raw = document.getElementById('url-input').value.trim();
    if (!raw) { showToast('請輸入網址'); return; }
    // 抓取網址（支援：純網址、文字+空格+網址、文字緊黏網址）
    const urlMatch2 = raw.match(/(https?:\/\/\S+)/);
    if (urlMatch2) {
      const extractedUrl2 = urlMatch2[1].replace(/[)】」'">]+$/, ''); // 去掉尾部標點
      const extractedText2 = raw.replace(urlMatch2[1], '').trim().replace(/\s+/g,' ').trim();
      if (extractedText2) {
        body.type = 'mixed';
        body.content = extractedText2;
        body.url = extractedUrl2;
      } else {
        body.type = 'url';
        body.url = extractedUrl2;
      }
    } else {
      // 沒有網址就當純文字存
      body.type = 'note';
      body.content = raw;
    }
  } else {
    if (!pendingImageB64) { showToast('請選擇圖片'); return; }
    body.type = 'image'; body.image = pendingImageB64;
  }

  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    const r = await fetch(`${api}/api/notes`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.success) {
      allNotes.unshift(d.note);
      renderNotes();
      hideAddModal();
      showToast('✅ 已儲存');
    } else {
      showToast('❌ ' + (d.error || '儲存失敗'));
    }
  } catch(e) {
    showToast('❌ ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '儲存筆記';
  }
}

// ── 編輯筆記 ──
let editingNoteId = null;
let editingTags = [];

function openEditModal(id) {
  const note = allNotes.find(n => n.id === id);
  if (!note) return;
  editingNoteId = id;
  editingTags = [...(note.tags || [])];

  // 填入現有資料
  document.getElementById('edit-category').value = note.category || 'note';
  document.getElementById('edit-note').value = note.note || '';
  document.getElementById('edit-tag-input').value = '';

  // 渲染標籤群組
  renderEditTagGroups();
  renderEditTagsPreview();

  document.getElementById('edit-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
  document.body.style.overflow = '';
  editingNoteId = null;
  editingTags = [];
}

function renderEditTagGroups() {
  const el = document.getElementById('edit-tag-groups');
  if (!el) return;
  el.innerHTML = TAG_GROUPS.map(g => `
    <div style="margin-bottom:8px">
      <div style="font-size:0.65rem;color:var(--dim);margin-bottom:5px">${g.icon} ${g.name}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${g.tags.map(t => {
          const isSelected = editingTags.includes(t);
          return `<button onclick="toggleEditTag('${t}',this)"
            style="padding:4px 10px;border-radius:20px;border:1px solid ${isSelected ? 'var(--accent)' : 'var(--border)'};background:${isSelected ? 'rgba(124,106,247,0.2)' : 'transparent'};color:${isSelected ? 'var(--accent)' : 'var(--dim)'};font-size:0.72rem;cursor:pointer"
            data-tag="${t}">${t}</button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function toggleEditTag(tag, btn) {
  if (editingTags.includes(tag)) {
    editingTags = editingTags.filter(t => t !== tag);
    btn.style.background = 'transparent';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--dim)';
  } else {
    editingTags.push(tag);
    btn.style.background = 'rgba(124,106,247,0.2)';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
  }
  renderEditTagsPreview();
}

function addEditTag() {
  const input = document.getElementById('edit-tag-input');
  const val = input.value.trim().replace(/^#/, '');
  if (!val || editingTags.includes(val)) return;
  editingTags.push(val);
  input.value = '';
  renderEditTagGroups();
  renderEditTagsPreview();
}

function renderEditTagsPreview() {
  const el = document.getElementById('edit-tags-preview');
  if (!el) return;
  el.innerHTML = editingTags.map(t =>
    `<span onclick="toggleEditTag('${t}',{style:{}})" style="font-size:0.72rem;padding:2px 8px;background:rgba(124,106,247,0.15);border-radius:8px;color:var(--accent);cursor:pointer">#${t} ✕</span>`
  ).join('');
}

async function saveEdit() {
  if (!editingNoteId) return;
  const api = localStorage.getItem('notes_api');
  const category = document.getElementById('edit-category').value;
  const noteText = document.getElementById('edit-note').value.trim();

  try {
    const r = await fetch(`${api}/api/notes/${editingNoteId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        category,
        tags: editingTags,
        note: noteText,
      })
    });
    const d = await r.json();
    if (d.success) {
      // 更新本地資料
      const idx = allNotes.findIndex(n => n.id === editingNoteId);
      if (idx !== -1) {
        allNotes[idx].category = category;
        allNotes[idx].tags = editingTags;
        allNotes[idx].note = noteText;
      }
      renderNotes();
      closeEditModal();
      showToast('✅ 已更新');
    } else {
      showToast('❌ ' + (d.error || '更新失敗'));
    }
  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

// ── 刪除 ──
async function deleteNote(id) {
  if (!confirm('確定刪除？')) return;
  const api = localStorage.getItem('notes_api');
  try {
    const r = await fetch(`${api}/api/notes/${id}`, {method: 'DELETE'});
    const d = await r.json();
    if (d.success) {
      allNotes = allNotes.filter(n => n.id !== id);
      renderNotes();
      showToast('🗑️ 已刪除');
    }
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── 貼上事件：嘗試從 Rich Text 抽取網址 ──
function handlePaste(e, inputId) {
  const clipData = e.clipboardData || window.clipboardData;
  if (!clipData) return;

  // 嘗試讀取 HTML 格式（Rich Text）
  const html = clipData.getData('text/html');
  if (html) {
    // 從 HTML 抽取所有 href
    const hrefMatch = html.match(/href=["'](https?:\/\/[^"']+)["']/);
    if (hrefMatch) {
      e.preventDefault();
      const url = hrefMatch[1];
      // 同時取純文字
      const plainText = clipData.getData('text/plain') || '';
      const combined = plainText ? `${plainText.trim()} ${url}` : url;
      const el = document.getElementById(inputId);
      if (el) {
        el.value = combined;
        el.dispatchEvent(new Event('input'));
      }
      return;
    }
  }
  // 沒有 Rich Text 就用預設貼上行為
}

// ── 標籤篩選 ──
function setTagFilter(tag, el) {
  currentTagFilter = tag;
  document.querySelectorAll('#tag-filter-scroll .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderNotes();
}

// ── 渲染標籤群組 ──
function renderTagGroups() {
  const el = document.getElementById('tag-groups-ui');
  if (!el) return;
  el.innerHTML = TAG_GROUPS.map(g => `
    <div style="margin-bottom:8px">
      <div style="font-size:0.65rem;color:var(--dim);margin-bottom:5px">${g.icon} ${g.name}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${g.tags.map(t => `
          <button onclick="togglePresetTag('${t}',this)"
            style="padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:0.72rem;cursor:pointer;transition:all 0.15s"
            data-preset="${t}">${t}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function togglePresetTag(tag, btn) {
  if (pendingTags.includes(tag)) {
    pendingTags = pendingTags.filter(t => t !== tag);
    btn.style.background = 'transparent';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--dim)';
  } else {
    pendingTags.push(tag);
    btn.style.background = 'rgba(124,106,247,0.2)';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
  }
  renderPendingTags();
}

// ── 拖曳圖片 ──
function onImageDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor = 'var(--border)';
  const file = e.dataTransfer?.files?.[0];
  if (file && file.type.startsWith('image/')) {
    processImageFile(file);
  }
}

// ── 全域 paste 監聽（Ctrl+V 貼圖）──
document.addEventListener('paste', e => {
  // 只在圖片 tab 開啟時生效
  if (currentTab !== 'image') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) {
        processImageFile(file);
        e.preventDefault();
        break;
      }
    }
  }
});

function processImageFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 1080;
      let w = img.width, h = img.height;
      if (Math.max(w,h) > max) {
        const r = max / Math.max(w,h);
        w = Math.round(w*r); h = Math.round(h*r);
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      pendingImageB64 = dataUrl.split(',')[1];
      const preview = document.getElementById('img-preview');
      preview.src = dataUrl;
      preview.style.display = 'block';
      showToast('✅ 圖片已載入');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── 外部連結開啟（iOS PWA 相容）──
function openExternal(url) {
  if (!url) return;
  // iOS PWA 用 location.href 搭配 setTimeout 回來
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── 圖片放大 ──
function openImageModal(url) {
  const modal = document.getElementById('img-modal');
  document.getElementById('img-modal-img').src = url;
  document.getElementById('img-modal-dl').href = url;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeImageModal() {
  document.getElementById('img-modal').style.display = 'none';
  document.body.style.overflow = '';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
